# Stage 2 config: cross-entropy warmup, then SCST fine-tuning from epoch 44
# onward (equivalent to the v8 notebook). Typically used together with
# `resume_checkpoint` or `pretrained_checkpoint` pointing at the best
# checkpoint produced by stage 1 (configs/default.yaml).
#
#   python -m imgcap.train --config configs/scst.yaml \
#       --pretrained-checkpoint checkpoints/best_model.pt

images_dir: "data/flickr30k_images"
captions_csv: "data/flickr30k_images/results.csv"
split_csv_path: "artifacts/flickr30_split.csv"
vocab_stoi_path: "artifacts/vocab_stoi.pkl"
vocab_itos_path: "artifacts/vocab_itos.pkl"

train_split: 0.70
val_split: 0.20
test_split: 0.10

cap: null
num_workers: 4

feature_size: 2048
lstm_hidden_size: 1024
num_layers: 2
embedding_dim: 1024
attention_dim: 512
dropout: 0.5

batch_size: 128
epochs: 100
lr: 0.0004
encoder_lr: 0.00001
weight_decay: 0.0001
label_smoothing: 0.1
teacher_forcing_ratio: 0.80
grad_clip: 5.0

warmup_epochs: 3
lr_scheduler: "plateau"

# Switch from cross-entropy to SCST at this epoch.
scst_start_epoch: 44

eval_every: 1
best_metric: "cider"

save_dir: "checkpoints"
save_every: 5
resume_checkpoint: null
pretrained_checkpoint: null

use_wandb: false
wandb_project: "imgcap-flickr30k"
wandb_run_name: "resnet50-lstm-attn-scst"
log_every: 1

use_hf_hub: false
hf_repo_id: null
hf_private_repo: false

seed: 42
device: "cuda"
